name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller taller.spec --clean

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path "dist\TallerMecanico" -DestinationPath "TallerMecanico-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TallerMecanico-Windows
          path: TallerMecanico-Windows.zip
          retention-days: 30
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Upload executable folder
        uses: actions/upload-artifact@v4
        with:
          name: TallerMecanico-Folder
          path: dist\TallerMecanico
          retention-days: 30
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
